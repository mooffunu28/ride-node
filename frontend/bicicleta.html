<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D.E. - Seguridad en Bicicleta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/bicicleta.css">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <div class="header">
        <div class="header-container">
            <div class="logo" onclick="window.location.href='/'">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="logo-text">R.I.D.E <span>| Seguridad Vial</span></div>
            </div>
            <div class="header-actions">
                <button class="btn-back" onclick="window.location.href='/'">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                <button id="btnIdioma" class="btn-idioma">🌐 English</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="welcome-banner">
            <h1 id="titulo">🚲 Seguridad en Bicicleta</h1>
            <p id="subtitulo">Revisa tu estado, conoce las normas y calcula tu nivel de riesgo</p>
        </div>

        <div class="cards-grid">
            <!-- Tarjeta de Normas -->
            <div class="card">
                <h2><i class="fas fa-book"></i> <span id="tituloNormas">📋 Normas de Tránsito</span></h2>
                <div id="normas-container" class="normas-list">
                    <div class="loading">Cargando normas...</div>
                </div>
            </div>

            <!-- Tarjeta de Chequeo Preventivo -->
            <div class="card">
                <h2><i class="fas fa-clipboard-list"></i> <span id="tituloChequeo">✅ Chequeo Preventivo (Antes de salir)</span></h2>
                <div id="chequeo-container" class="checklist-container">
                    <div class="loading">Cargando checklist...</div>
                </div>
            </div>

            <!-- Tarjeta de Evaluación de Riesgo -->
            <div class="card">
                <h2><i class="fas fa-calculator"></i> <span id="tituloRiesgo">⚠️ Evaluación de Riesgo del Viaje</span></h2>
                <div class="calculadora-container">
                    <div class="form-row">
                        <div class="form-group" style="flex:1">
                            <label id="labelVelocidad">Velocidad máxima planeada (km/h)</label>
                            <input type="number" id="velocidad" class="form-control" placeholder="Velocidad máxima">
                        </div>
                        <div class="form-group" style="flex:1">
                            <label id="labelDistancia">Distancia del recorrido (km)</label>
                            <input type="number" id="distancia" class="form-control" placeholder="Distancia">
                        </div>
                    </div>
                    <div class="form-group">
                        <label id="labelClima">Condiciones climáticas</label>
                        <select id="clima" class="form-control">
                            <option value="dia">☀️ Día soleado</option>
                            <option value="lluvia">🌧️ Lluvia</option>
                            <option value="noche">🌙 Noche</option>
                            <option value="niebla">🌫️ Niebla</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label id="labelTipoVia">Tipo de vía</label>
                        <select id="tipo_via" class="form-control">
                            <option value="urbana">🏙️ Urbana (máx 25 km/h)</option>
                            <option value="rural">🌄 Rural (máx 30 km/h)</option>
                            <option value="carretera">🛣️ Carretera (NO RECOMENDADO)</option>
                        </select>
                    </div>
                    <div id="componentes-check"></div>
                    <button id="calcularRiesgo" class="btn-calcular">
                        <span id="btnCalcularTexto">Evaluar Riesgo del Viaje</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <div id="resultado-riesgo" class="resultado-riesgo"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/bicicleta.js"></script>
</body>
</html>
