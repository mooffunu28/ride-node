<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D.E. - Seguridad en Moto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .back-button { background: #1a3a3a; color: white; padding: 0.5rem 1.2rem; border-radius: 40px; text-decoration: none; font-weight: 500; }
        .btn-idioma { background: #1a3a3a; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; cursor: pointer; font-weight: 500; }
        
        .page-header { background: linear-gradient(135deg, #b96f0f 0%, #8a5500 100%); color: white; padding: 2rem; border-radius: 32px; margin-bottom: 2rem; }
        .page-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        
        .card { background: white; border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { margin-bottom: 1rem; color: #1a3a3a; display: flex; align-items: center; gap: 0.5rem; }
        
        .norma-item { padding: 1rem; border-bottom: 1px solid #eef2f2; }
        .norma-item:last-child { border-bottom: none; }
        .multa-badge { display: inline-block; background: #fff3e0; color: #e67e22; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; margin-top: 0.5rem; }
        
        .checklist-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: #fafafa; border-radius: 16px; margin-bottom: 0.5rem; }
        .checklist-item input { width: 22px; height: 22px; cursor: pointer; }
        .priority-high { color: #c00; font-size: 0.75rem; }
        .priority-medium { color: #e67e22; font-size: 0.75rem; }
        
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 1rem; font-size: 1rem; }
        .btn-calcular { background: #b96f0f; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 1rem; width: 100%; }
        .checkbox-label { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; padding: 0.5rem; background: #f8fafc; border-radius: 12px; cursor: pointer; }
        
        .resultado-riesgo { margin-top: 1rem; padding: 1rem; border-radius: 12px; }
        .riesgo-critico { background: #fee; color: #c00; border-left: 4px solid #c00; }
        .riesgo-moderado { background: #fff3e0; color: #e67e22; border-left: 4px solid #e67e22; }
        .riesgo-seguro { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        
        .loading { text-align: center; padding: 2rem; color: #6b8a8a; }
        .error-message { color: red; padding: 1rem; text-align: center; background: #ffe0e0; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <a href="/" class="back-button" id="btnVolver">← Volver al inicio</a>
            <button id="btnIdioma" class="btn-idioma">🌐 English</button>
        </div>
        
        <div class="page-header">
            <h1 id="titulo">🏍️ Seguridad en Moto</h1>
            <p id="subtitulo">Revisa tu estado, conoce las normas y calcula tu nivel de riesgo</p>
        </div>
        
        <div class="card">
            <h2 id="tituloNormas">📋 Normas de Tránsito</h2>
            <div id="normas-container" class="loading">Cargando normas...</div>
        </div>
        
        <div class="card">
            <h2 id="tituloChequeo">✅ Chequeo Preventivo</h2>
            <div id="chequeo-container" class="loading">Cargando checklist...</div>
        </div>
        
        <div class="card">
            <h2 id="tituloRiesgo">⚠️ Calculadora de Riesgo</h2>
            <div>
                <input type="number" id="velocidad" class="form-control" placeholder="Velocidad (km/h)">
                <div id="componentes-check"></div>
                <button id="calcularRiesgo" class="btn-calcular">Calcular Riesgo</button>
                <div id="resultado-riesgo" class="resultado-riesgo"></div>
            </div>
        </div>
    </div>
    
    <script>
        const textos = {
            es: {
                volver: "← Volver al inicio",
                titulo: "🏍️ Seguridad en Moto",
                subtitulo: "Revisa tu estado, conoce las normas y calcula tu nivel de riesgo",
                normas: "📋 Normas de Tránsito",
                chequeo: "✅ Chequeo Preventivo",
                riesgo: "⚠️ Calculadora de Riesgo",
                velocidad: "Velocidad (km/h)",
                calcular: "Calcular Riesgo",
                prioridad: "Prioridad",
                buen_estado: "en buen estado",
                cargando: "Cargando...",
                multa: "Multa tipo",
                articulo: "Artículo"
            },
            en: {
                volver: "← Back to home",
                titulo: "🏍️ Motorcycle Safety",
                subtitulo: "Check your status, know the rules and calculate your risk level",
                normas: "📋 Traffic Rules",
                chequeo: "✅ Preventive Check",
                riesgo: "⚠️ Risk Calculator",
                velocidad: "Speed (km/h)",
                calcular: "Calculate Risk",
                prioridad: "Priority",
                buen_estado: "in good condition",
                cargando: "Loading...",
                multa: "Fine type",
                articulo: "Article"
            }
        };
        
        let idiomaActual = localStorage.getItem('ride_idioma') || 'es';
        
        function aplicarTextos() {
            const t = textos[idiomaActual];
            document.getElementById('btnVolver').innerHTML = t.volver;
            document.getElementById('titulo').innerHTML = t.titulo;
            document.getElementById('subtitulo').innerHTML = t.subtitulo;
            document.getElementById('tituloNormas').innerHTML = t.normas;
            document.getElementById('tituloChequeo').innerHTML = t.chequeo;
            document.getElementById('tituloRiesgo').innerHTML = t.riesgo;
            document.getElementById('velocidad').placeholder = t.velocidad;
            document.getElementById('calcularRiesgo').innerHTML = t.calcular;
            document.getElementById('btnIdioma').innerHTML = idiomaActual === 'es' ? '🌐 English' : '🌐 Español';
        }
        
        function cambiarIdioma() {
            idiomaActual = idiomaActual === 'es' ? 'en' : 'es';
            localStorage.setItem('ride_idioma', idiomaActual);
            aplicarTextos();
            cargarNormas();
            cargarChequeo();
        }
        
        async function cargarNormas() {
            const container = document.getElementById('normas-container');
            const t = textos[idiomaActual];
            container.innerHTML = `<div class="loading">${t.cargando}</div>`;
            
            try {
                const response = await fetch(`/api/normas`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    container.innerHTML = data.map(n => {
                        return `
                            <div class="norma-item">
                                <strong>${n.titulo || 'Norma'}</strong>
                                <p style="margin-top: 0.25rem;">${n.descripcion || 'Sin descripción'}</p>
                                <span class="multa-badge">📌 Categoría: ${n.categoria || 'General'}</span>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div class="error-message">⚠️ ' + (idiomaActual === 'es' ? 'No hay normas cargadas' : 'No rules loaded') + '</div>';
                }
            } catch (error) {
                container.innerHTML = `<div class="error-message">❌ ${idiomaActual === 'es' ? 'Error al cargar normas' : 'Error loading rules'}: ${error.message}</div>`;
            }
        }
        
        async function cargarChequeo() {
            const container = document.getElementById('chequeo-container');
            const checkContainer = document.getElementById('componentes-check');
            const t = textos[idiomaActual];
            container.innerHTML = `<div class="loading">${t.cargando}</div>`;
            
            try {
                const response = await fetch(`/api/chequeo?tipo=moto`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    container.innerHTML = data.map(c => `
                        <div class="checklist-item">
                            <input type="checkbox" class="check-componente" data-comp="${c.id}" data-nombre="${c.item_nombre}">
                            <div style="flex:1">
                                <strong>${c.item_nombre}</strong>
                                <br><small>Estado: ${c.estado || 'Pendiente'}</small>
                            </div>
                        </div>
                    `).join('');
                    
                    checkContainer.innerHTML = data.map(c => `
                        <label class="checkbox-label">
                            <input type="checkbox" class="check-riesgo" data-nombre="${c.item_nombre}">
                            ${c.item_nombre} ${t.buen_estado}
                        </label>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="error-message">⚠️ ' + (idiomaActual === 'es' ? 'No hay componentes registrados' : 'No components registered') + '</div>';
                }
            } catch (error) {
                container.innerHTML = `<div class="error-message">❌ ${idiomaActual === 'es' ? 'Error al cargar checklist' : 'Error loading checklist'}: ${error.message}</div>`;
            }
        }
        
        document.getElementById('calcularRiesgo')?.addEventListener('click', async () => {
            const velocidad = document.getElementById('velocidad').value || 0;
            const checkboxes = document.querySelectorAll('.check-riesgo');
            const componentes = { casco: false, luces: false, frenos: false, espejos: false };
            
            checkboxes.forEach(cb => {
                const nombre = cb.getAttribute('data-nombre') || '';
                if (nombre.includes('Casco')) componentes.casco = cb.checked;
                if (nombre.includes('Luces')) componentes.luces = cb.checked;
                if (nombre.includes('Frenos')) componentes.frenos = cb.checked;
                if (nombre.includes('Espejos')) componentes.espejos = cb.checked;
            });
            
            const divResultado = document.getElementById('resultado-riesgo');
            divResultado.innerHTML = `<div class="loading">${textos[idiomaActual].cargando}</div>`;
            
            try {
                const response = await fetch('/api/riesgo/calcular', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ velocidad: parseInt(velocidad), tipo_vehiculo: 'moto', componentes, idioma: idiomaActual })
                });
                const resultado = await response.json();
                
                let clase = '';
                let nivelTexto = '';
                if (resultado.nivel === 'crítico') {
                    clase = 'riesgo-critico';
                    nivelTexto = idiomaActual === 'es' ? '🚨 NIVEL CRÍTICO' : '🚨 CRITICAL LEVEL';
                } else if (resultado.nivel === 'moderado') {
                    clase = 'riesgo-moderado';
                    nivelTexto = idiomaActual === 'es' ? '⚠️ NIVEL MODERADO' : '⚠️ MODERATE LEVEL';
                } else {
                    clase = 'riesgo-seguro';
                    nivelTexto = idiomaActual === 'es' ? '✅ NIVEL SEGURO' : '✅ SAFE LEVEL';
                }
                
                divResultado.innerHTML = `
                    <div class="${clase}" style="padding:1rem;">
                        <strong>${nivelTexto}</strong>
                        <p style="margin-top: 0.5rem;">${resultado.mensaje || 'Sin mensaje'}</p>
                        <p>${idiomaActual === 'es' ? 'Puntaje' : 'Score'}: ${resultado.puntaje || 0}/100</p>
                        ${resultado.factores?.length ? `<strong>${idiomaActual === 'es' ? 'Factores de riesgo:' : 'Risk factors:'}</strong><ul style="margin-left: 1rem; margin-top: 0.25rem;">${resultado.factores.map(f => `<li>${f}</li>`).join('')}</ul>` : ''}
                        ${resultado.recomendaciones?.length ? `<strong>${idiomaActual === 'es' ? 'Recomendaciones:' : 'Recommendations:'}</strong><ul style="margin-left: 1rem; margin-top: 0.25rem;">${resultado.recomendaciones.map(r => `<li>${r}</li>`).join('')}</ul>` : ''}
                    </div>
                `;
            } catch (error) {
                divResultado.innerHTML = `<div class="riesgo-critico" style="padding:1rem;">❌ ${idiomaActual === 'es' ? 'Error calculando riesgo' : 'Error calculating risk'}: ${error.message}</div>`;
            }
        });
        
        document.getElementById('btnIdioma')?.addEventListener('click', cambiarIdioma);
        
        aplicarTextos();
        cargarNormas();
        cargarChequeo();
    </script>
</body>
</html>
